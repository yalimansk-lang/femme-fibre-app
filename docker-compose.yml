services:
  client-service:
    build:
      context: ./client-service
      dockerfile: Dockerfile
    ports:
      - "8081:5001"  # This maps a completely clean public port (8081) to the app
    volumes:
      - ./client-service:/app

  catalog-service:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    ports:
      - "8082:5002"  # This maps a completely clean public port (8082) to the app
    volumes:
      - ./catalog-service:/app